<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motorsport & F1 - Mi Portal</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <!-- Font Awesome cargado solo en desktop (ahorra ~100KB en móviles) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="(min-width: 1025px)">
    
    <style>
        /* RESET GLOBAL: Evita el desborde y el zoom innecesario */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            overflow-x: hidden; /* Prohibido el scrolleo horizontal */
            -webkit-text-size-adjust: 100%; /* Evita que el navegador agrande la letra solo */
        }
        
        /* ====== VARIABLES ====== */
        :root {
            --text-main: #f1f3f8;
            --accent-f1: #e10600; /* Rojo F1 */
            --accent-wec: #00adb5; /* Azul/Celeste motor */
            --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --max-width: 1200px;
        }

        /* ====== FONDO DINÁMICO ====== */
        body {
            margin: 0;
            color: var(--text-main);
            font-family: var(--font);
            min-height: 100vh;
            background-color: #06080d;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: brightness(0.35) contrast(1.1) saturate(1.2);
            transition: background-image 2s ease-in-out;
            background: linear-gradient(135deg, #0d0608 0%, #1d0a0f 50%, #080504 100%) fixed;
        }
        
        @media (max-width: 1024px) {
            body::before {
                background: linear-gradient(135deg, #0d0608 0%, #1d0a0f 50%, #080504 100%) !important;
                background-attachment: scroll !important;
                filter: none !important;
            }
        }

        /* ====== NAVEGACIÓN Y HEADER ====== */
        .top-nav {
            padding: clamp(15px, 4vw, 40px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: var(--max-width);
            margin: 0 auto;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        @media (max-width: 1024px) {
            .btn-back {
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
                background: rgba(255, 255, 255, 0.08);
            }
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .page-title {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0.4) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 10px 20px rgba(0, 0, 0, 0.5);
        }

        /* ====== GRID Y TARJETAS LÍQUIDAS ====== */
        .dashboard {
            width: min(100%, var(--max-width));
            margin: 0 auto 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }
        
        @media (min-width: 1025px) {
            .dashboard {
                grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            }
        }

        .glass-card {
            background: rgba(18, 18, 22, 0.35);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 30px;
            box-shadow: inset 0 2px 3px rgba(255, 255, 255, 0.05), 0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            max-height: 75vh;
        }
        
        @media (max-width: 1024px) {
            .glass-card {
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
                background: rgba(18, 18, 22, 0.75);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
                max-height: none;
            }
        }

        .glass-card h2 {
            margin: 0;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* ====== ELEMENTOS INTERNOS ====== */
        .tab-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid transparent;
            color: rgba(255, 255, 255, 0.5);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .tab-btn:hover { color: white; }
        
        .tab-f1.active {
            background: rgba(225, 6, 0, 0.15);
            border-color: rgba(225, 6, 0, 0.4);
            color: white;
        }

        .tab-motor.active {
            background: rgba(0, 173, 181, 0.15);
            border-color: rgba(0, 173, 181, 0.4);
            color: white;
        }

        .select-glass {
            background: rgba(0,0,0,0.5);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 6px 12px;
            outline: none;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        
        @media (max-width: 1024px) {
            .select-glass {
                backdrop-filter: none !important;
                background: rgba(0,0,0,0.6);
            }
        }

        .select-glass option {
            background: #111;
            color: white;
        }

        .content-area {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
        }

        /* Scrollbar custom para el cristal */
        .content-area::-webkit-scrollbar { width: 6px; }
        .content-area::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        .content-area::-webkit-scrollbar-track { background: transparent; }

        /* Tablas transparentes */
        .glass-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .glass-table th {
            text-align: left;
            border-bottom: 2px solid rgba(255, 255, 255, 0.15);
            padding: 10px 5px;
            color: rgba(255,255,255,0.7);
        }
        .glass-table td {
            padding: 12px 5px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .f1-row-mclaren {
            background: rgba(255, 128, 0, 0.15);
            border-left: 3px solid #ff8000;
        }

        .btn-update {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 12px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .btn-update:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }

        /* AJUSTE RESPONSIVO PARA SUBPÁGINAS (Móviles) */
        @media (max-width: 600px) {
            /* Centramos la navegación superior */
            .top-nav {
                flex-direction: column !important;
                gap: 15px !important;
                padding: 20px 10px !important;
                text-align: center !important;
            }

            .page-title {
                font-size: 1.8rem !important; /* Título más acorde al móvil */
            }

            /* Forzamos que el contenedor sea una sola columna centrada */
            .dashboard {
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                gap: 20px !important;
                padding: 0 15px 100px 15px !important;
            }

            /* Ajustamos las tarjetas para que no se desborden y se centren */
            .glass-card {
                width: 100% !important;
                max-width: 360px !important; /* Un poco más ancho que los botones de home para poder leer bien */
                padding: 20px !important;
                max-height: none !important; /* Permitimos que la tarjeta crezca hacia abajo para scrollear mejor */
            }

            /* Ajuste específico para el reproductor de TV y videos */
            .ratio-16x9 {
                border-radius: 12px !important;
            }
        }

    </style>
</head>
<body>

    <div class="top-nav">
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Volver al Inicio</a>
        <h1 class="page-title">Motorsport & F1</h1>
    </div>

    <div class="dashboard">
        
        <div class="glass-card">
            <div class="header-card">
                <h2><i class="fas fa-flag-checkered" style="color: var(--accent-f1)"></i> Fórmula 1</h2>
            </div>
    
            <div class="tab-menu">
                <button class="tab-btn tab-f1 active" onclick="cambiarTabF1(this, 'noticias')">Noticias</button>
                <button class="tab-btn tab-f1" onclick="cambiarTabF1(this, 'calendario')">Calendario</button>
                <button class="tab-btn tab-f1" onclick="cambiarTabF1(this, 'posiciones')">Posiciones</button>
            </div>

            <div class="content-area">
                <p><i id="status-f1" style="color: rgba(255,255,255,0.5); font-size: 0.85rem;">Sintonizando telemetría...</i></p>
                <div id="lista-f1"></div>
            </div>
            <button class="btn-update" onclick="actualizarF1()">Actualizar F1</button>
        </div>

        <div class="glass-card">
            <div class="header-card">
                <h2><i class="fas fa-car-side" style="color: var(--accent-wec)"></i> Motorsport</h2>
                <select id="select-motor" class="select-glass" onchange="cambiarMotor()">
                    <option value="wec">WEC</option>
                    <option value="indycar">IndyCar</option>
                    <option value="imsa">IMSA</option>
                </select>
            </div>

            <div class="tab-menu" id="menu-motor">
                <button class="tab-btn tab-motor active" onclick="cambiarTabMotor(this, 'noticias')">Noticias</button>
                <button class="tab-btn tab-motor" onclick="cambiarTabMotor(this, 'calendario')">Calendario</button>
                <a id="link-standings" href="https://lat.motorsport.com/wec/standings/" target="_blank" class="tab-btn" style="margin-left: auto; text-decoration: none; border-color: rgba(255,255,255,0.2);">Ver Standings <i class="fas fa-external-link-alt" style="font-size: 0.7rem; margin-left: 3px;"></i></a>
            </div>

            <div class="content-area">
                <p><i id="status-motor" style="color: rgba(255,255,255,0.5); font-size: 0.85rem;">Sintonizando pista...</i></p>
                <div id="lista-motor"></div>
            </div>
            <button class="btn-update" onclick="actualizarMotor()">Actualizar Motorsport</button>
        </div>

    </div>

    <script>
        // --- ROTACIÓN DE FONDO ---
        const bgImages = [
            "https://images.ctfassets.net/gy95mqeyjg28/4DCWEw7FYzoky73roJSLpZ/16228392768ba87c63147fee8d390e5b/launch_2026_mcl40_desktop-2.png?w=1600&q=75&fm=webp",
            "https://images.ctfassets.net/gy95mqeyjg28/2gtUGEfRaDDXILBqVSIj4Q/c57799cbb8b458aca1b953dc5d1703cc/launch_2026_lando_desktop.jpg?w=1600&q=75&fm=webp",
            "https://images.ctfassets.net/gy95mqeyjg28/5eFFdEkNfSJRI8fjAmk1IX/6463449c24e60400e609c14b95bdb37d/launch_2026_oscar_desktop.jpg?w=1600&q=75&fm=webp",
            "https://images.ctfassets.net/gy95mqeyjg28/jV7wzpNM81sJbTsydOOnm/39defa649d545c2e8417bb944a85c0ca/lando-world-champion-graphic-desktop.webp?w=1600&q=75"
        ];

        function rotarFondo() {
            const index = Math.floor(Math.random() * bgImages.length);
            const style = document.createElement('style');
            style.textContent = `body::before { background-image: url('${bgImages[index]}'); }`;
            const existing = document.getElementById('bg-rotator');
            if (existing) existing.remove();
            style.id = 'bg-rotator';
            document.head.appendChild(style);
        }

        window.addEventListener('load', () => {
            rotarFondo();
            setInterval(rotarFondo, 120000);
        });

        // --- VARIABLES GLOBALES ---
        let tabF1 = "noticias";
        let categoriaMotor = "wec";
        let tabMotor = "noticias";

        // --- LÓGICA DE F1 ---
        function cambiarTabF1(elemento, tab) {
            document.querySelectorAll('.tab-f1').forEach(t => t.classList.remove('active'));
            elemento.classList.add('active');
            tabF1 = tab;
            actualizarF1();
        }

        async function actualizarF1() {
            const lista = document.getElementById('lista-f1');
            const status = document.getElementById('status-f1');
            status.innerText = "Sintonizando telemetría...";

            try {
                const res = await fetch(`/api/f1/${tabF1}`);
                const datos = await res.json();
                lista.innerHTML = "";

                if (tabF1 === 'posiciones') {
                    if (datos.length === 0) {
                        lista.innerHTML = "<p style='color: #888;'>Cargando datos de Motorsport.com...</p>";
                        return;
                    }
                    let html = `<table class="glass-table">
                        <thead><tr><th>Pos</th><th>Piloto - Equipo</th><th>Pts</th></tr></thead>
                        <tbody>`;
                    datos.forEach(p => {
                        const esMcLaren = p.equipo && p.equipo.toLowerCase().includes("mclaren");
                        const clase = esMcLaren ? ' class="f1-row-mclaren"' : '';
                        const displayText = p.equipo ? `${p.piloto} - <span style="color:rgba(255,255,255,0.5); font-size:0.8rem;">${p.equipo}</span>` : p.piloto;
                        html += `<tr${clase}><td>${p.pos}</td><td>${displayText}</td><td><strong>${p.puntos}</strong></td></tr>`;
                    });
                    html += `</tbody></table>`;
                    lista.innerHTML = html;

                } else if (tabF1 === 'calendario') {
                    if (datos.length === 0) {
                        lista.innerHTML = "<p style='color: #888;'>Sin datos disponibles.</p>";
                    } else {
                        const proximaCarrera = obtenerProximaCarrera(datos);
                        let html = "<ul style='padding-left: 0; list-style: none;'>";
                        datos.forEach(carrera => {
                            const estado = calcularEstadoCarrera(carrera.fecha);
                            const esProxima = proximaCarrera && proximaCarrera === carrera.id;
                            
                            let estilo = "border-left: 3px solid transparent;";
                            let marcaEstado = "";
                            
                            if (estado === "completada") {
                                estilo += "opacity: 0.4;";
                            } else if (estado === "hoy") {
                                estilo += "background: rgba(225, 6, 0, 0.2); border-left-color: #e10600; padding-left: 10px; border-radius: 4px;";
                                marcaEstado = " <span style='color:#e10600; font-size:0.75rem;'><i class='fas fa-circle'></i> HOY</span>";
                            } else if (esProxima) {
                                estilo += "background: rgba(255, 255, 255, 0.05); border-left-color: white; padding-left: 10px; border-radius: 4px;";
                                marcaEstado = " <span style='color:white; font-size:0.75rem;'><i class='fas fa-arrow-right'></i> PRÓXIMA</span>";
                            }
                            
                            const textDecoration = estado === "completada" ? "text-decoration: line-through;" : "";
                            
                            html += `<li style="${estilo} margin-bottom: 12px; padding: 8px 0 8px 10px;">
                                <div style="${textDecoration} font-weight: 600; color: white;">${carrera.nombre}${marcaEstado}</div>
                                <div style="font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 4px;">
                                    <i class="far fa-calendar-alt"></i> ${carrera.fecha} | <i class="fas fa-map-marker-alt"></i> ${carrera.ubicacion}
                                </div>
                            </li>`;
                        });
                        html += "</ul>";
                        lista.innerHTML = html;
                    }
                } else {
                    if (datos.length === 0) {
                        lista.innerHTML = "<p style='color: #888;'>Sin datos disponibles en este momento.</p>";
                    } else {
                        lista.innerHTML = `<ul style="padding-left: 0; list-style: none;">` + datos.map(n => `
                            <li style="margin-bottom:15px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                                <span style="color:var(--accent-f1); font-size:0.75rem; text-transform:uppercase; font-weight:bold;">${n.fecha} ${n.hora} • ${n.fuente}</span><br>
                                <a href="${n.link}" target="_blank" style="color:white; text-decoration:none; font-weight:500; display:block; margin-top:5px; transition: color 0.2s;">${n.titulo}</a>
                            </li>
                        `).join('') + `</ul>`;
                    }
                }
                status.innerText = "Actualizado: " + new Date().toLocaleTimeString();
            } catch (e) {
                status.innerText = "Error en el paddock.";
                lista.innerHTML = "<p style='color: #ff4444;'>Error al cargar los datos.</p>";
            }
        }

        // --- LÓGICA MOTORSPORT ---
        function cambiarMotor() {
            categoriaMotor = document.getElementById('select-motor').value;
            const linkStandings = document.getElementById('link-standings');
            const linksMap = {
                "wec": "https://lat.motorsport.com/wec/standings/",
                "indycar": "https://www.indycar.com/standings",
                "imsa": "https://www.imsa.com/"
            };
            linkStandings.href = linksMap[categoriaMotor] || "#";
            
            document.querySelectorAll('.tab-motor').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-motor')[0].classList.add('active');
            tabMotor = "noticias";
            actualizarMotor();
        }

        function cambiarTabMotor(elemento, tab) {
            document.querySelectorAll('.tab-motor').forEach(t => t.classList.remove('active'));
            elemento.classList.add('active');
            tabMotor = tab;
            actualizarMotor();
        }

        async function actualizarMotor() {
            const lista = document.getElementById('lista-motor');
            const status = document.getElementById('status-motor');
            status.innerText = "Cargando datos...";

            try {
                let url = `/api/motor/${categoriaMotor}/${tabMotor}`;
                const res = await fetch(url);
                const datos = await res.json();
                lista.innerHTML = "";

                if (tabMotor === 'noticias') {
                    if (datos.length === 0) {
                        lista.innerHTML = "<p style='color: #888;'>Sin noticias disponibles.</p>";
                    } else {
                        lista.innerHTML = `<ul style="padding-left: 0; list-style: none;">` + datos.map(n => `
                            <li style="margin-bottom:15px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                                <span style="color:var(--accent-wec); font-size:0.75rem; text-transform:uppercase; font-weight:bold;">${n.fecha} ${n.hora} • ${n.fuente}</span><br>
                                <a href="${n.link}" target="_blank" style="color:white; text-decoration:none; font-weight:500; display:block; margin-top:5px;">${n.titulo}</a>
                            </li>
                        `).join('') + `</ul>`;
                    }
                } else if (tabMotor === 'calendario') {
                    if (datos.length === 0) {
                        lista.innerHTML = "<p style='color: #888;'>Sin carreras disponibles.</p>";
                    } else {
                        const proximaCarrera = obtenerProximaCarrera(datos);
                        let html = '<div style="display: flex; flex-direction: column; gap: 12px;">';
                        
                        datos.forEach(carrera => {
                            const estado = calcularEstadoCarrera(carrera.fecha);
                            const es_proxima = carrera.id === proximaCarrera;
                            const fechaObj = new Date(carrera.fecha + "T00:00:00");
                            const fechaFormato = fechaObj.toLocaleDateString('es-AR', { day: '2-digit', month: 'short' });
                            
                            let estiloFila = "border-left: 3px solid rgba(255,255,255,0.1); padding-left: 12px;";
                            let marcador = "";
                            let opacity = "1";
                            
                            if (estado === 'completada') {
                                opacity = "0.4";
                                estiloFila += " text-decoration: line-through;";
                            } else if (es_proxima) {
                                estiloFila = "background: rgba(255, 255, 255, 0.05); border-left: 3px solid white; padding-left: 12px; border-radius: 4px;";
                                marcador = " <span style='color:white; font-size:0.75rem;'><i class='fas fa-arrow-right'></i> PRÓXIMA</span>";
                            } else if (estado === 'hoy') {
                                estiloFila = "background: rgba(0, 173, 181, 0.2); border-left: 3px solid #00adb5; padding-left: 12px; border-radius: 4px;";
                                marcador = " <span style='color:#00adb5; font-size:0.75rem;'><i class='fas fa-circle'></i> HOY</span>";
                            }
                            
                            html += `<div style="padding: 10px 0; opacity: ${opacity}; ${estiloFila}">
                                <strong style="color: white; font-size: 1.05rem;">${carrera.nombre}${marcador}</strong>
                                <div style="color: rgba(255,255,255,0.6); margin-top: 5px; font-size: 0.85rem;">
                                    <i class="far fa-calendar-alt"></i> ${fechaFormato} | <i class="fas fa-map-marker-alt"></i> ${carrera.ubicacion}
                                </div>
                            </div>`;
                        });
                        html += '</div>';
                        lista.innerHTML = html;
                    }
                }
                status.innerText = "Actualizado: " + new Date().toLocaleTimeString();
            } catch (e) {
                status.innerText = "Error al cargar datos.";
                lista.innerHTML = "<p style='color: #ff4444;'>Error. Intenta de nuevo.</p>";
            }
        }

        // Utilidades de fechas
        function calcularEstadoCarrera(fechaStr) {
            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);
            const fechaCarrera = new Date(fechaStr + "T00:00:00");
            if (fechaCarrera < hoy) return "completada";
            if (fechaCarrera.getTime() === hoy.getTime()) return "hoy";
            return "proxima";
        }

        function obtenerProximaCarrera(datos) {
            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);
            for (let carrera of datos) {
                const fechaCarrera = new Date(carrera.fecha + "T00:00:00");
                if (fechaCarrera >= hoy) return carrera.id;
            }
            return null;
        }

        // Auto-inicio
        document.addEventListener('DOMContentLoaded', () => {
            actualizarF1();
            actualizarMotor();
        });
    </script>
