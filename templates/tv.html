<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canales en Vivo & Música - Mi Portal</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <!-- Font Awesome cargado solo en desktop (ahorra ~100KB en móviles) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="(min-width: 1025px)">
    
    <style>
        /* RESET GLOBAL: Evita el desborde y el zoom innecesario */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            overflow-x: hidden; /* Prohibido el scrolleo horizontal */
            -webkit-text-size-adjust: 100%; /* Evita que el navegador agrande la letra solo */
        }

        /* ====== VARIABLES ====== */
        :root {
            --text-main: #f1f3f8;
            --accent: #7A9DB4;
            --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --max-width: 1200px;
        }

        /* ====== FONDO DINÁMICO ====== */
        body {
            margin: 0;
            color: var(--text-main);
            font-family: var(--font);
            min-height: 100vh;
            background-color: #06080d;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: brightness(0.4) contrast(1.1) saturate(1.2);
            transition: background-image 2s ease-in-out;
            /* Gradiente fallback para móviles (reduce 80% del tamaño) */
            background: linear-gradient(135deg, #0a1118 0%, #1a2332 50%, #0f1a2a 100%) fixed;
        }
        
        /* En móviles: solo gradiente, sin intentar cargar imágenes */
        @media (max-width: 1024px) {
            body::before {
                background: linear-gradient(135deg, #0a1118 0%, #1a2332 50%, #0f1a2a 100%) !important;
                background-attachment: scroll !important;
                filter: none !important;
            }
        }

        /* ====== NAVEGACIÓN Y HEADER ====== */
        .top-nav {
            padding: clamp(15px, 4vw, 40px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: var(--max-width);
            margin: 0 auto;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        @media (max-width: 1024px) {
            .btn-back {
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
                background: rgba(255, 255, 255, 0.08);
            }
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .page-title {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
            /* Efecto Texto Vidrio Líquido */
            background: linear-gradient(180deg, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0.4) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 10px 20px rgba(0, 0, 0, 0.5);
        }

        /* ====== GRID Y TARJETAS LÍQUIDAS ====== */
        .dashboard {
            width: min(100%, var(--max-width));
            margin: 0 auto 40px;
            display: grid;
            grid-template-columns: 1fr; /* Una columna para que el video sea grande */
            gap: 30px;
            padding: 0 20px;
        }

        @media (min-width: 1025px) {
            .dashboard {
                grid-template-columns: 3fr 2fr; /* TV más grande que Música en PC */
            }
        }

        .glass-card {
            background: rgba(18, 18, 22, 0.35); /* Más transparente */
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 30px;
            box-shadow: 
                inset 0 2px 3px rgba(255, 255, 255, 0.05),
                0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
        }
        
        /* Deshabilitar blur en móviles (ahorro CPU/GPU) */
        @media (max-width: 1024px) {
            .glass-card {
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
                background: rgba(18, 18, 22, 0.75);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            }
        }

        .glass-card h2 {
            margin: 0 0 20px 0;
            font-size: 1.5rem;
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .glass-card h2 i {
            color: var(--accent);
        }

        /* ====== ELEMENTOS INTERNOS ====== */
        .ratio {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 18px;
            background: #000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        .ratio::before { display: block; content: ""; }
        .ratio-16x9::before { padding-top: 56.25%; }
        .ratio > iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* Botón de pantalla completa personalizado */
        .fullscreen-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }
        
        @media (max-width: 1024px) {
            .fullscreen-btn {
                backdrop-filter: none !important;
                background: rgba(0, 0, 0, 0.8);
            }
        }
        .fullscreen-btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.1); }

        /* Estado de pantalla completa manual (vía JS) */
        .ratio.is-fullscreen {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 99999 !important;
            border-radius: 0 !important;
            margin: 0 !important;
        }
        .ratio.is-fullscreen::before { display: none; }
        .ratio.is-fullscreen .fullscreen-btn { bottom: 20px; right: 20px; }

        /* Pestañas (Tabs) */
        .tab-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .tab-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        .tab-btn.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            color: white;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        /* Botones de acción */
        .btn-action {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.85rem;
        }
        .btn-action:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
        
        /* Deshabilitar transforms en móviles */
        @media (max-width: 1024px) {
            .btn-action:hover { transform: none; }
        }

        .input-glass {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 10px 15px;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }
        .input-glass:focus { border-color: rgba(255,255,255,0.4); }
        
        /* Ocultar iconos Font Awesome en móviles (no necesita descarga) */
        @media (max-width: 1024px) {
            .fas, .fab { display: none; }
        }
        
        /* Fallback de texto para móviles cuando Font Awesome no carga */
        @media (max-width: 1024px) {
            .btn-back::before { content: "← "; }
            .glass-card h2::before { content: ""; }
        }

        
        /* AJUSTE RESPONSIVO PARA SUBPÁGINAS (Móviles) */
        @media (max-width: 600px) {
            /* Navegación superior alineada a la izquierda */
            .top-nav {
                flex-direction: row !important;
                justify-content: space-between !important;
                align-items: center !important;
                padding: 40px 10px 20px 10px !important;
                text-align: left !important;
            }

            .page-title {
                font-size: 1.8rem !important; /* Título más acorde al móvil */
            }

            /* Forzamos que el contenedor sea una sola columna centrada */
            .dashboard {
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                gap: 20px !important;
                padding: 0 15px 100px 15px !important;
            }

            /* Ajustamos las tarjetas para que no se desborden y se centren */
            .glass-card {
                width: 100% !important;
                max-width: 360px !important; /* Un poco más ancho que los botones de home para poder leer bien */
                padding: 20px !important;
                max-height: none !important; /* Permitimos que la tarjeta crezca hacia abajo para scrollear mejor */
            }

            /* Ajuste específico para el reproductor de TV y videos */
            .ratio-16x9 {
                border-radius: 12px !important;
            }
        }

        /* 1. Arreglo para Horizontal (Foto 1): Permitimos que la card crezca al rotar el celu */
        @media (max-width: 1024px) and (orientation: landscape) {
            .dashboard {
                padding: 10px !important; /* Mínimo margen */
                margin: 0 !important;
                max-width: 100% !important; /* La card usa todo el ancho del celu horizontal */
                align-items: center !important;
            }
            .glass-card {
                max-width: 100% !important;
                margin: 0 !important;
            }
        }

        /* 2. Arreglo para el botón de Maximizar (Foto 2 y General): Ignoramos restricciones de parents */
        /* Target específico para cuando el elemento nativo de maximizar está activo en Android Chrome */
        /* Estilos para el iframe en modo pantalla completa */
        /* Cuando el documento está en pantalla completa, asegurar que el contenedor del video ocupe todo el espacio */
        :-webkit-full-screen .ratio,
        :-moz-full-screen .ratio,
        :-ms-fullscreen .ratio,
        :fullscreen .ratio {
            width: 100vw !important;
            height: 100vh !important;
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            z-index: 9999 !important;
            background-color: black !important;
            border-radius: 0 !important; /* Eliminar bordes redondeados en fullscreen */
        }

        /* Asegurar que el iframe dentro del ratio también ocupe el 100% */
        :-webkit-full-screen .ratio iframe,
        :-moz-full-screen .ratio iframe,
        :-ms-fullscreen .ratio iframe,
        :fullscreen .ratio iframe {
            width: 100% !important;
            height: 100% !important;
            position: absolute !important; /* Mantener absolute dentro del fixed parent */
            top: 0 !important;
            left: 0 !important;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Volver al Inicio</a>
        <h1 class="page-title">Media Center</h1>
    </div>

    <div class="dashboard">
        
        <div class="glass-card">
            <h2><i class="fas fa-satellite-dish"></i> Transmisiones en Vivo</h2>
            
            <div class="tab-menu">
                <button class="tab-btn active" onclick="cambiarCanal(this, 'https://www.youtube.com/embed/oN6OHb9CnOY?autoplay=1&mute=0')">Afro House 24h</button>
                <button class="tab-btn" onclick="cambiarCanal(this, 'https://www.youtube.com/embed/live_stream?channel=UC58em84jwiyM20qR-iqBDZw')">IMSA TV</button>
                <button class="tab-btn" onclick="cambiarCanal(this, 'https://www.youtube.com/embed/live_stream?channel=UCwU7U7PiarcJKLjDJTnANjw')">FIA WEC</button>
            </div>

            <div class="ratio ratio-16x9">
                <iframe id="reproductor-tv" src="https://www.youtube.com/embed/oN6OHb9CnOY?autoplay=1&mute=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowfullscreen frameborder="0"></iframe>
                <button class="fullscreen-btn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
            </div>
        </div>

        <div class="glass-card">
            <h2><i class="fab fa-spotify"></i> Frecuencia Musical</h2>
            
            <div style="display: flex; flex-direction: column; gap: 20px; height: 100%;">
                
                <div style="background: rgba(0,0,0,0.5); border-radius: 18px; padding: 10px; border: 1px solid rgba(255,255,255,0.05);">
                    <iframe id="spotify-embed" src="https://open.spotify.com/embed/artist/1Xyo4u8uXC1ZmMpatF05PJ" width="100%" height="152" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>
                </div>

                <div>
                    <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6); margin: 0 0 10px 0;">Sintonía rápida:</p>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <button class="btn-action" onclick="cargarSpotifyArtist('1Xyo4u8uXC1ZmMpatF05PJ')">The Weeknd</button>
                        <button class="btn-action" onclick="cargarSpotifyArtist('4q3ewBCX7sLwd24euuV69X')">Bad Bunny</button>
                        <button class="btn-action" onclick="cargarSpotifyArtist('2ev6Cd0yJVCcpf2zezEQ8Z')">Anomalie Beats</button>
                        <button class="btn-action" onclick="cargarSpotifyArtist('07B3kEyZwUUqeYLZ5N7LtB')">Esteban Reyes</button>
                    </div>
                </div>

                <div style="margin-top: auto;">
                    <p style="font-size: 0.85rem; color: rgba(255,255,255,0.6); margin: 0 0 10px 0;">Cargar enlace manual:</p>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="spotify-url" class="input-glass" placeholder="URL o URI de Spotify...">
                        <button class="btn-action" style="white-space: nowrap;" onclick="cargarSpotifyDesdeInput()">
                            <i class="fas fa-play"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- ROTACIÓN DE FONDO (Igual al Home) ---
        const bgImages = [
            "https://website-images.mclaren.com/1942/mclaren-world-of-mclaren-wallpapers-720s-spider-gallery-1.jpg",
            "https://website-images.mclaren.com/1936/mclaren-world-of-mclaren-wallpapers-765lt-gallery-1.jpg",
            "https://website-images.mclaren.com/1924/mclaren-world-of-mclaren-wallpapers-elva-gallery-1.jpg",
            "https://images.ctfassets.net/gy95mqeyjg28/4DCWEw7FYzoky73roJSLpZ/16228392768ba87c63147fee8d390e5b/launch_2026_mcl40_desktop-2.png?w=1600&q=75&fm=webp"
        ];

        function rotarFondo() {
            const index = Math.floor(Math.random() * bgImages.length);
            const imgUrl = bgImages[index];
            const style = document.createElement('style');
            style.textContent = `body::before { background-image: url('${imgUrl}'); }`;
            const existing = document.getElementById('bg-rotator');
            if (existing) existing.remove();
            style.id = 'bg-rotator';
            document.head.appendChild(style);
        }

        window.addEventListener('load', () => {
            // Solo cargar rotación de fondo en desktop
            if (window.innerWidth > 900) {
                rotarFondo();
                setInterval(rotarFondo, 120000); // Cambia cada 2 minutos
            }
        });

        // --- LÓGICA DE PANTALLA COMPLETA ---
        function toggleFullscreen() {
            const ratioDiv = document.querySelector('.ratio');
            const iframe = document.getElementById('reproductor-tv');
            
            if (!document.fullscreenElement) {
                // Entrar en pantalla completa
                if (iframe.requestFullscreen) {
                    iframe.requestFullscreen();
                } else if (iframe.webkitRequestFullscreen) {
                    iframe.webkitRequestFullscreen();
                } else if (iframe.mozRequestFullScreen) {
                    iframe.mozRequestFullScreen();
                } else if (iframe.msRequestFullscreen) {
                    iframe.msRequestFullscreen();
                }
            } else {
                // Salir de pantalla completa
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // --- LÓGICA DE CANALES TV ---
        function cambiarCanal(boton, url) {
            // Actualizar botones visualmente
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            boton.classList.add('active');
            
            // Cambiar iframe
            document.getElementById('reproductor-tv').src = url;
        }

        // --- LÓGICA DE SPOTIFY ---
        function cargarSpotifyArtist(artistId) {
            const embed = `https://open.spotify.com/embed/artist/${artistId}`;
            document.getElementById('spotify-embed').src = embed;
        }

        function cargarSpotifyDesdeInput() {
            let valor = document.getElementById('spotify-url').value.trim();
            if (!valor) return;

            let finalUrl = "";
            if (valor.startsWith('spotify:')) {
                valor = valor.replace(/^spotify:/i, '').replace(/:/g, '/');
                finalUrl = `https://open.spotify.com/embed/${valor}`;
            } else if (valor.includes('open.spotify.com/')) {
                const urlObj = new URL(valor);
                let path = urlObj.pathname;
                finalUrl = `https://open.spotify.com/embed${path}`;
            } else {
                alert('Por favor, ingresá un link válido de Spotify.');
                return;
            }
            document.getElementById('spotify-embed').src = finalUrl;
            document.getElementById('spotify-url').value = ""; // Limpiar input
        }
    </script>
</body>
</html>
