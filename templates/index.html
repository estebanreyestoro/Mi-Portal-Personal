<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Portal Personal</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <style>
        /* RESET GLOBAL: Evita el desborde y el zoom innecesario */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            overflow-x: hidden; /* Prohibido el scrolleo horizontal */
            -webkit-text-size-adjust: 100%; /* Evita que el navegador agrande la letra solo */
        }
        /* ====== Variables de tema (Pantone) ====== */
        :root {
            --bg-primary: #06080d;
            --bg-layer: rgba(18, 18, 22, 0.65);
            --text-main: #f1f3f8;
            --text-muted: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.14);
            --card-shadow: 0 18px 40px rgba(0, 0, 0, 0.40);
            --glass-blur: 16px;
            --radius: 18px;

            --accent: #7A9DB4;
            --accent-soft: rgba(122, 157, 180, 0.25);
            --accent-2: #A68971;
            --accent-2-soft: rgba(166, 137, 113, 0.25);

            --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --max-width: 1280px;
        }

        /* ====== Fondo / vidrio líquido ====== */
        body {
            margin: 0;
            color: var(--text-main);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(135deg, rgba(1, 7, 22, 0.95), rgba(4, 16, 36, 0.95)),
                        url('about:blank') center/cover no-repeat fixed;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: background-image 2s ease-in-out;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: brightness(0.52) contrast(1.15) saturate(0.95);
            opacity: 1;
            transition: opacity 2s ease-in-out;
            pointer-events: none;
            /* Gradiente fallback para móviles */
            background: linear-gradient(135deg, #0a1118 0%, #1a2332 50%, #0f1a2a 100%) fixed;
        }
        
        @media (max-width: 1024px) {
            body {
                background-attachment: scroll !important;
            }
            body::before {
                background: linear-gradient(135deg, #0a1118 0%, #1a2332 50%, #0f1a2a 100%) !important;
                background-attachment: scroll !important;
                filter: none !important;
            }
        }

        /* ====== Layout principal ====== */

        /* ====== HERO SECTION (Estilo Apple / Liquid Glass) ====== */
        .hero-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: clamp(35vh, 50vh, 45vh);
            text-align: center;
            margin-bottom: 20px;
            padding: 20px;
            animation: fadeIn 2s ease-out;
        }

        #saludo-titulo {
            font-size: clamp(3rem, 6vw, 5rem); /* Escalado dinámico */
            font-weight: 800;
            letter-spacing: -1.5px;
            margin: 0;
            /* Efecto Texto Vidrio Líquido (Base) */
            background: linear-gradient(180deg, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0.3) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 15px 30px rgba(0, 0, 0, 0.6); /* Sombra para despegar del fondo */
            line-height: 1.1;
        }

        .time-display {
            font-family: var(--font); /* Chau a la fuente de código de antes */
            font-size: clamp(5rem, 12vw, 10rem); /* GIGANTE */
            font-weight: 200; /* Letra ultra fina estilo Apple */
            letter-spacing: -4px;
            margin: 0px;
            /* Efecto Texto Vidrio Líquido (Reflejo) */
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.1) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            /* El relieve del cristal */
            text-shadow: 
                2px 2px 5px rgba(0,0,0,0.4),
                -1px -1px 2px rgba(255,255,255,0.3);
        }

        .clima-display {
            font-size: clamp(1rem, 2vw, 1.2rem);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
            text-transform: uppercase;
            /* Una sutil pastilla de vidrio esmerilado para que no estorbe al texto gigante */
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        @media (max-width: 1024px) {
            .clima-display {
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
                background: rgba(0, 0, 0, 0.4);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: var(--accent);
            margin: 0 auto 28px;
            max-width: var(--max-width);
        }

        .dashboard {
            width: min(100%, var(--max-width));
            margin: 0 auto 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
            gap: 20px;
            padding: 0 12px;
        }
        
        @media (min-width: 1025px) {
            .dashboard {
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            }
        }

        /* ====== Cards (glass) ====== */
        .card {
            position: relative;
            background: var(--bg-layer);
            border: 1px solid var(--card-border);
            border-radius: var(--radius);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            padding: 20px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        
        @media (max-width: 1024px) {
            .card {
                backdrop-filter: none !important;
                -webkit-backdrop-filter: none !important;
                background: rgba(18, 18, 22, 0.75);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
                transition: box-shadow 0.25s ease;
            }
            
            .card:hover {
                transform: none;
            }
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 22px 55px rgba(0, 0, 0, 0.6);
        }

        .card h2 {
            margin: 0 0 14px;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            padding-bottom: 10px;
            color: var(--accent);
            text-align: center;
        }

        .card .content {
            text-align: justify;
            text-align-last: left;
        }

        .content {
            margin: 14px 0;
            font-size: 0.92rem;
            line-height: 1.55;
            flex-grow: 1;
        }

        .btn-update {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 11px 14px;
            border-radius: 999px;
            cursor: pointer;
            font-weight: 700;
            letter-spacing: 0.02em;
            transition: transform 0.15s ease, background-color 0.25s ease;
            width: 100%;
        }

        .btn-update:hover {
            background-color: var(--accent-soft);
            transform: translateY(-1px);
        }
        
        @media (max-width: 1024px) {
            .btn-update:hover {
                transform: none;
            }
        }

        .loading {
            opacity: 0.55;
            pointer-events: none;
        }

        /* ====== Temas por sección (Pantone) ====== */
        .theme-f1 { --card-accent: #A94432; --card-accent-soft: rgba(169, 68, 50, 0.23); }
        .theme-wec { --card-accent: #3E5C8C; --card-accent-soft: rgba(62, 92, 140, 0.25); }
        .theme-cine { --card-accent: #9B8C5C; --card-accent-soft: rgba(155, 140, 92, 0.25); }
        .theme-musica { --card-accent: #7A5C7F; --card-accent-soft: rgba(122, 92, 127, 0.22); }
        .theme-futbol { --card-accent: #4A6B5C; --card-accent-soft: rgba(74, 107, 92, 0.22); }
        .theme-errepar { --card-accent: #5BA3A8; --card-accent-soft: rgba(91, 163, 168, 0.22); }
        .theme-tv { --card-accent: #2E4DA7; --card-accent-soft: rgba(46, 77, 167, 0.23); }

        .card.theme-f1 h2,
        .card.theme-wec h2,
        .card.theme-cine h2,
        .card.theme-musica h2,
        .card.theme-futbol h2,
        .card.theme-errepar h2,
        .card.theme-tv h2 {
            color: var(--card-accent);
        }

        .card.theme-f1 { border-color: rgba(169, 68, 50, 0.4); }
        .card.theme-wec { border-color: rgba(62, 92, 140, 0.4); }
        .card.theme-cine { border-color: rgba(155, 140, 92, 0.4); }
        .card.theme-musica { border-color: rgba(122, 92, 127, 0.4); }
        .card.theme-futbol { border-color: rgba(74, 107, 92, 0.4); }
        .card.theme-errepar { border-color: rgba(91, 163, 168, 0.4); }
        .card.theme-tv { border-color: rgba(46, 77, 167, 0.4); }

        /* ====== Ajustes de diseño específico ====== */
        @media (min-width: 1025px) {
            .theme-musica, .theme-tv {
                grid-column: 1 / -1;
            }
        }

        /* ====== Ajustes de layout responsive ====== */
        @media (max-width: 1024px) {
            body {
                padding: 14px 10px;
            }
            h1 {
                font-size: 1.6rem;
            }
        }

        @media (max-width: 480px) {
            .btn-update {
                padding: 10px;
            }
        }

        /* ====== Helpers y scrolls ====== */
        #card-noticias .content, #card-futbol .content {
            max-height: 250px;
            overflow-y: auto;
            padding-right: 6px;
        }

        #card-noticias a {
            color: var(--text-main);
            text-decoration: none;
            transition: color 0.2s;
        }

        #card-noticias a:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        #card-noticias li {
            margin-bottom: 8px;
        }

        .tab-f, .tab-f1, .tab-cine, .tab-motor, .tab-tv {
            cursor: pointer;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.65);
            padding: 6px 10px;
            border-radius: 8px;
            transition: background 0.2s ease, color 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.22);
        }

        .tab-f.active, .tab-f1.active, .tab-cine.active, .tab-motor.active, .tab-tv.active {
            background: rgba(255, 255, 255, 0.12);
            color: white;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.15);
        }

        .tab-f:hover:not(.active), .tab-f1:hover:not(.active), .tab-cine:hover:not(.active), .tab-motor:hover:not(.active), .tab-tv:hover:not(.active) {
            background: rgba(255, 255, 255, 0.08);
        }

        .tab-cine.active {
            border-color: rgba(0, 173, 181, 0.6);
        }

        .tab-f1.active, .tab-motor.active {
            border-color: rgba(0, 123, 255, 0.6);
        }

        .tab-tv.active {
            border-color: rgba(46, 77, 167, 0.6);
        }

        /* Aspect Ratio Helpers */
        .ratio {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
        }
        .ratio::before {
            display: block;
            content: "";
        }
        .ratio-16x9::before {
            padding-top: 56.25%;
        }
        .ratio > * {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .f1-table, .motor-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .f1-table th, .motor-table th {
            text-align: left;
            border-bottom: 2px solid rgba(255, 255, 255, 0.12);
            padding: 8px 4px;
            color: var(--accent);
        }

        .f1-table td, .motor-table td {
            padding: 10px 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .motor-row:hover {
            background: rgba(0, 173, 181, 0.12);
        }

        /* Scrollbars custom */
        #card-motor .content::-webkit-scrollbar,
        #card-f1 .content::-webkit-scrollbar,
        #card-noticias .content::-webkit-scrollbar {
            width: 6px;
        }

        #card-motor .content::-webkit-scrollbar-thumb,
        #card-f1 .content::-webkit-scrollbar-thumb,
        #card-noticias .content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.18);
            border-radius: 10px;
        }

        #card-motor .content::-webkit-scrollbar-track,
        #card-f1 .content::-webkit-scrollbar-track,
        #card-noticias .content::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.15);
        }

        /* FUERZA UNA SOLA COLUMNA EN CELULARES */
        @media (max-width: 600px) {
            .home-grid {
                display: flex !important; /* Cambiamos a Flex para mejor control de centrado */
                flex-direction: column !important;
                align-items: center !important;
                gap: 20px !important;
                padding: 20px 15px 100px 15px !important;
            }

            .home-btn {
                width: 100% !important; /* Ocupa el ancho disponible */
                max-width: 320px !important; /* Pero no se estira de más, para mantener la forma de gota */
                padding: 35px 20px !important;
            }

            /* Ajuste de los textos para que no se amontonen */
            .home-btn i {
                font-size: 2.8rem !important;
            }

            .home-btn span {
                font-size: 0.9rem !important;
            }

            /* Achicamos un poco el reloj para que las cards suban */
            .time-display {
                font-size: 4.5rem !important;
                letter-spacing: -2px !important;
            }
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <h1 id="saludo-titulo">Buenos días</h1>
        <div class="time-display" id="hora-actual">--:--</div>
        <div class="clima-display" id="clima-info">Cargando clima...</div>
    </div>

    <div class="dashboard">
        <style>
            /* ====== BOTONES HOME: ESTILO LIQUID GLASS (Drops) ====== */
        .home-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            padding-bottom: 100px; /* Espacio extra abajo */
        }

        .home-btn {
            background: transparent; /* TOTALMENTE TRANSPARENTE */
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 50px 30px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); /* Animación suave */
            position: relative;
            overflow: hidden; /* Para el reflejo líquido */
            
            /* LA FORMA LÍQUIDA: Bordes muy suaves y asimétricos */
            border-radius: 60px 20px 60px 20px;
            
            /* EL CRISTAL: Relieve sutil */
            border: 1px solid rgba(255, 255, 255, 0.15); /* El borde fino de la gota */
            
            /* Sombra interna para el relieve + Sombra externa para profundidad */
            box-shadow: 
                inset 0 2px 3px rgba(255, 255, 255, 0.1), /* Brillo interno arriba */
                inset 0 -10px 20px rgba(0, 0, 0, 0.2),   /* Sombra interna abajo (volumen) */
                0 15px 35px rgba(0, 0, 0, 0.5);          /* Sombra externa (despegado del fondo) */
            
            backdrop-filter: blur(25px); /* El efecto esmerilado */
            -webkit-backdrop-filter: blur(25px);
        }

        /* EL REFLEJO LÍQUIDO (Brillo superior) */
        .home-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 60%);
            transform: rotate(-30deg);
            opacity: 0.7;
            pointer-events: none;
        }

        /* EFECTOS AL PASAR EL MOUSE (Hover) */
        .home-btn:hover {
            transform: translateY(-8px) scale(1.03); /* Se levanta y agranda un poquito */
            background: rgba(255, 255, 255, 0.1); /* Se ilumina levemente por dentro */
            border-color: rgba(255, 255, 255, 0.4); /* El borde se marca más */
            box-shadow: 
                inset 0 2px 5px rgba(255, 255, 255, 0.3),
                inset 0 -15px 30px rgba(255, 255, 255, 0.05),
                0 25px 50px rgba(0, 0, 0, 0.6);
        }

        /* ESTILOS PARA LOS ÍCONOS (Minimalistas) */
        .home-btn i {
            font-size: 3.5rem; /* Grandes y finos */
            color: rgba(255, 255, 255, 0.9);
            /* Sutil efecto de vidrio también en el ícono */
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); 
            transition: all 0.3s ease;
        }
        
        .home-btn:hover i {
            color: var(--accent); /* El ícono se ilumina al pasar el mouse */
            filter: drop-shadow(0 0 15px var(--accent));
            transform: scale(1.1);
        }

        /* ESTILOS PARA EL TEXTO */
        .home-btn span {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase; /* Todo en mayúscula estilo Apple */
        }

        @media (max-width: 1024px) {
            .home-grid {
                display: grid !important;
                grid-template-columns: 1fr !important;
                justify-items: center !important;
                gap: 24px !important;
                padding: 30px 16px 90px 16px !important;
            }

            .home-btn {
                width: min(100%, 560px) !important;
                max-width: 100% !important;
                padding: 32px 24px !important;
            }

            .home-btn i {
                font-size: 3rem !important;
            }
        }

        /* Tablets landscape con altura limitada deben comportarse como móvil */
        @media (orientation: landscape) and (max-height: 900px) {
            .home-grid {
                display: grid !important;
                grid-template-columns: 1fr !important;
                justify-items: center !important;
                gap: 24px !important;
                padding: 30px 16px 90px 16px !important;
            }

            .home-btn {
                width: min(100%, 560px) !important;
                max-width: 100% !important;
                padding: 32px 24px !important;
            }

            .home-btn i {
                font-size: 3rem !important;
            }
        }
        </style>

        <div class="home-grid">
            <a href="/tv" class="home-btn theme-tv">
                <i class="fas fa-tv"></i> <span>Canales en Vivo & Música</span>
            </a>
            
            <a href="/motor" class="home-btn theme-f1">
                <i class="fas fa-car"></i> <span>Motorsport & F1</span>
            </a>

            <a href="/utilidades" class="home-btn" style="border-color: rgba(91, 163, 168, 0.4);">
                <i class="fas fa-briefcase" style="color: #5BA3A8; filter: drop-shadow(0 0 10px rgba(91,163,168,0.5));"></i>
                <span>Utilidades</span>
            </a>

            <a href="/cine" class="home-btn" style="border-color: rgba(229, 169, 61, 0.4);">
                <i class="fas fa-film" style="color: #E5A93D; filter: drop-shadow(0 0 10px rgba(229,169,61,0.5));"></i>
                <span>Cine Rex</span>
            </a>

            <a href="/futbol" class="home-btn theme-futbol">
                <i class="fas fa-futbol"></i> <span>Fútbol</span>
            </a>

            <a href="/noticias" class="home-btn" style="border-color: rgba(169, 68, 50, 0.4);">
                <i class="fas fa-globe-americas" style="color: #A94432; filter: drop-shadow(0 0 10px rgba(169,68,50,0.5));"></i> <span>Noticias Internacionales</span>
            </a>
        </div>
    </div>

    <script>
    // --- VARIABLES DE ESTADO ---
    let equipoActual = "San Lorenzo";
    let tabFutbol = "noticias";
    let tabF1 = "noticias";
    let categoriaMotor = "wec";
    let tabMotor = "noticias";
    let tabTV = "afrohouse";

    // --- LÓGICA DE CANALES EN VIVO ---
    function cambiarTabTV(elemento, tab) {
        document.querySelectorAll('.tab-tv').forEach(t => t.classList.remove('active'));
        elemento.classList.add('active');
        tabTV = tab;
        
        const lista = document.getElementById('lista-tv');
        if (tab === 'afrohouse') {
            lista.innerHTML = `
                <div class="ratio ratio-16x9">
                    <iframe src="https://www.youtube.com/embed/oN6OHb9CnOY?autoplay=1&mute=0" allowfullscreen frameborder="0"></iframe>
                </div>
            `;
        } else if (tab === 'imsa') {
            lista.innerHTML = `
                <div class="ratio ratio-16x9">
                    <iframe src="https://www.youtube.com/embed/live_stream?channel=UC58em84jwiyM20qR-iqBDZw" allowfullscreen frameborder="0"></iframe>
                </div>
            `;
        } else if (tab === 'wec') {
            lista.innerHTML = `
                <div class="ratio ratio-16x9">
                    <iframe src="https://www.youtube.com/embed/live_stream?channel=UCwU7U7PiarcJKLjDJTnANjw" allowfullscreen frameborder="0"></iframe>
                </div>
            `;
        }
    }

    // --- LÓGICA DE FÚTBOL ---
    function cambiarEquipo() {
        equipoActual = document.getElementById('select-equipo').value;
        actualizarFutbol();
    }

    function cambiarTabFutbol(elemento, tab) {
        document.querySelectorAll('.tab-f').forEach(t => t.classList.remove('active'));
        elemento.classList.add('active');
        tabFutbol = tab;
        actualizarFutbol();
    }

    async function actualizarFutbol() {
        const lista = document.getElementById('lista-futbol');
        const status = document.getElementById('status-futbol');
        status.innerText = "Actualizando...";
        
        try {
            const res = await fetch(`/api/futbol/${encodeURIComponent(equipoActual)}/${tabFutbol}`);
            const datos = await res.json();
            
            lista.innerHTML = datos.map(n => `
                <li style="margin-bottom:12px;">

    function calcularEstadoCarrera(fechaStr) {
        // Calcula dinámicamente el estado de una carrera comparando con la fecha actual
        const hoy = new Date();
        hoy.setHours(0, 0, 0, 0); // Normalizar a inicio del día
        
        const fechaCarrera = new Date(fechaStr);
        fechaCarrera.setHours(0, 0, 0, 0); // Normalizar a inicio del día
        
        if (fechaCarrera < hoy) {
            return "completada"; // Pasada
        } else if (fechaCarrera.getTime() === hoy.getTime()) {
            return "hoy"; // Hoy
        } else {
            return "proxima"; // Futura
        }
    }

    function obtenerProximaCarrera(datos) {
        // Retorna la primera carrera que no ha pasado
        const hoy = new Date();
        hoy.setHours(0, 0, 0, 0);
        
        for (let carrera of datos) {
            const fechaCarrera = new Date(carrera.fecha);
            fechaCarrera.setHours(0, 0, 0, 0);
            if (fechaCarrera >= hoy) {
                return carrera.id;
            }
        }
        return null;
    }

    // --- MÚSICA (Spotify embed) ---
    function obtenerEmbedSpotify(urlOrUri) {
        if (!urlOrUri) return null;
        let valor = urlOrUri.trim();

        // Soporta URIs tipo spotify:track:... spotify:playlist:...
        if (valor.toLowerCase().startsWith('spotify:')) {
            valor = valor.replace(/^spotify:/i, '');
            valor = valor.replace(/:/g, '/');
            return `https://open.spotify.com/embed/${valor}`;
        }

        // Soporta URLs normales de Spotify
        try {
            const parsed = new URL(valor);
            if (parsed.hostname.includes('spotify.com')) {
                let path = parsed.pathname;
                if (path.endsWith('/')) path = path.slice(0, -1);
                return 'https://open.spotify.com/embed' + path;
            }
        } catch (e) {
            return null;
        }

        return null;
    }

    function cargarSpotifyEmbed(src) {
        const iframe = document.getElementById('spotify-embed');
        if (!iframe) return;
        iframe.src = src;
    }

    let currentBgIndex = 0;

    function rotarFondo() {
        const bodyBefore = document.body.style;
        const bgElement = document.body._bgElement;
        
        // Obtener próxima imagen (random para variedad)
        currentBgIndex = Math.floor(Math.random() * bgImages.length);
        const imgUrl = bgImages[currentBgIndex];
        
        // Establecer imagen de fondo en ::before pseudo-elemento
        const style = document.createElement('style');
        style.textContent = `body::before { background-image: url('${imgUrl}'); }`;
        
        // Remover estilos anteriores si existen
        const existingStyle = document.getElementById('bg-rotator');
        if (existingStyle) existingStyle.remove();
        
        style.id = 'bg-rotator';
        document.head.appendChild(style);
    }

    // Inicializar fondo y rotar cada 2 minutos
    // --- SALUDO Y HORA DINÁMICA ---
    function actualizarSaludoYHora() {
        const ahora = new Date();
        const horas = String(ahora.getHours()).padStart(2, '0');
        const minutos = String(ahora.getMinutes()).padStart(2, '0');
        const segundos = String(ahora.getSeconds()).padStart(2, '0');
        
        // Mostrar hora
        document.getElementById('hora-actual').textContent = `${horas}:${minutos}:${segundos}`;
        
        // Determinar saludo según hora (Argentina: UTC-3)
        const horaNum = ahora.getHours();
        let saludo = 'Buenos días';
        if (horaNum >= 12 && horaNum < 18) {
            saludo = 'Buenas tardes';
        } else if (horaNum >= 18 || horaNum < 6) {
            saludo = 'Buenas noches';
        }
        document.getElementById('saludo-titulo').textContent = saludo;
    }

    // --- CLIMA (Carmen de Patagones / Viedma) ---
    async function cargarClima() {
        try {
            // Usar Open-Meteo (sin API key requerida)
            // Carmen de Patagones: -40.7833, -65.5167
            const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=-40.7833&longitude=-65.5167&current=temperature_2m,weather_code,is_day&temperature_unit=celsius&timezone=America/Argentina/ComodRivadavia');
            const data = await response.json();
            
            if (data.current) {
                const temp = Math.round(data.current.temperature_2m);
                const condicion = obtenerDescripcionClima(data.current.weather_code, data.current.is_day);
                document.getElementById('clima-info').textContent = `Carmen de Patagones/Viedma: ${temp}°C - ${condicion}`;
            }
        } catch (error) {
            console.error('Error al cargar clima:', error);
            document.getElementById('clima-info').textContent = 'Carmen de Patagones/Viedma: Clima no disponible';
        }
    }

    function obtenerDescripcionClima(codigo, esDia) {
        const climaSoleado = {
            0: 'Despejado',
            1: 'Mayormente despejado',
            2: 'Parcialmente nublado',
            3: 'Nublado',
            45: 'Neblina',
            48: 'Neblina',
            51: 'Llovizna',
            53: 'Llovizna',
            55: 'Llovizna',
            61: 'Lluvia',
            63: 'Lluvia',
            65: 'Lluvia',
            80: 'Lluvia',
            81: 'Lluvia',
            82: 'Lluvia',
            85: 'Nieve',
            86: 'Nieve',
            77: 'Nieve'
        };
        return climaSoleado[codigo] || 'Continuando...';
    }
