<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias Internacionales - Mi Portal</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <!-- Font Awesome cargado solo en desktop (ahorra ~100KB en móviles) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="(min-width: 1025px)">
    <style>
        /* RESET GLOBAL: Evita el desborde y el zoom innecesario */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            overflow-x: hidden; /* Prohibido el scrolleo horizontal */
            -webkit-text-size-adjust: 100%; /* Evita que el navegador agrande la letra solo */
        }
        
        /* Reutilizamos el mismo CSS, solo cambiamos el acento */
        :root { --text-main: #f1f3f8; --accent-noticias: #A94432; --font: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; --max-width: 800px; }
        body { margin: 0; color: var(--text-main); font-family: var(--font); min-height: 100vh; background-color: #06080d; overflow-x: hidden; }
        body::before { content: ''; position: fixed; inset: 0; z-index: -1; background-size: cover; background-position: center; background-attachment: fixed; filter: brightness(0.4) contrast(1.1) saturate(1.2); transition: background-image 2s ease-in-out; background: linear-gradient(135deg, #0d0606 0%, #1d0f0a 50%, #0a0605 100%) fixed; }
        @media (max-width: 1024px) { body::before { background: linear-gradient(135deg, #0d0606 0%, #1d0f0a 50%, #0a0605 100%) !important; background-attachment: scroll !important; filter: none !important; } }
        .top-nav { padding: clamp(15px, 4vw, 40px); display: flex; justify-content: space-between; align-items: center; max-width: var(--max-width); margin: 0 auto; }
        .btn-back { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: white; text-decoration: none; padding: 12px 25px; border-radius: 30px; font-weight: 500; backdrop-filter: blur(10px); transition: all 0.3s ease; display: flex; align-items: center; gap: 10px; }
        .btn-back:hover { background: rgba(255, 255, 255, 0.15); transform: translateX(-5px); }
        .page-title { font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 800; margin: 0; letter-spacing: -1px; background: linear-gradient(180deg, rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0.4) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .dashboard { width: min(100%, var(--max-width)); margin: 0 auto 40px; display: grid; grid-template-columns: 1fr; gap: 30px; padding: 0 20px; }
        .glass-card { background: rgba(18, 18, 22, 0.35); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.12); backdrop-filter: blur(25px); padding: 30px; box-shadow: inset 0 2px 3px rgba(255, 255, 255, 0.05), 0 20px 40px rgba(0, 0, 0, 0.4); display: flex; flex-direction: column; max-height: 75vh; }
        .header-card { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .glass-card h2 { margin: 0; font-size: 1.5rem; color: rgba(255,255,255,0.9); font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .content-area { overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        .content-area::-webkit-scrollbar { width: 6px; }
        .content-area::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        .news-item { margin-bottom: 15px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); transition: all 0.3s ease; border-left: 3px solid var(--accent-noticias); }
        .news-item:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); transform: translateX(3px); }
        .news-meta { font-size: 0.75rem; text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 6px; color: rgba(255,255,255,0.6); }
        .news-link { color: white; text-decoration: none; font-weight: 500; display: block; line-height: 1.4; transition: color 0.2s; font-size: 1.05rem; }
        .news-link:hover { color: var(--accent-noticias); }
        .btn-update { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); padding: 12px; border-radius: 999px; cursor: pointer; font-weight: 600; width: 100%; margin-top: 15px; transition: all 0.3s; }
        .btn-update:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
        
        @media (max-width: 1024px) {
            .btn-back { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; background: rgba(255, 255, 255, 0.08); }
            .glass-card { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; background: rgba(18, 18, 22, 0.75); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
            .select-glass { backdrop-filter: none !important; background: rgba(0,0,0,0.6); }
            .btn-update:hover { transform: none; }
        }

        /* AJUSTE RESPONSIVO PARA SUBPÁGINAS (Móviles) */
        @media (max-width: 600px) {
            /* Navegación superior alineada a la izquierda */
            .top-nav {
                flex-direction: row !important;
                justify-content: space-between !important;
                align-items: center !important;
                padding: 20px 10px !important;
                text-align: left !important;
            }

            .page-title {
                font-size: 1.8rem !important; /* Título más acorde al móvil */
            }

            /* Forzamos que el contenedor sea una sola columna centrada */
            .dashboard {
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                gap: 20px !important;
                padding: 0 15px 100px 15px !important;
            }

            /* Ajustamos las tarjetas para que no se desborden y se centren */
            .glass-card {
                width: 100% !important;
                max-width: 360px !important; /* Un poco más ancho que los botones de home para poder leer bien */
                padding: 20px !important;
                max-height: none !important; /* Permitimos que la tarjeta crezca hacia abajo para scrollear mejor */
            }

            /* Ajuste específico para el reproductor de TV y videos */
            .ratio-16x9 {
                border-radius: 12px !important;
            }
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Volver al Inicio</a>
        <h1 class="page-title">Geopolítica</h1>
    </div>

    <div class="dashboard">
        <div class="glass-card">
            <div class="header-card">
                <h2><i class="fas fa-globe-americas" style="color: var(--accent-noticias)"></i> Conflictos Internacionales</h2>
            </div>
            <div class="content-area">
                <p><i id="status-noticias" style="color: rgba(255,255,255,0.5); font-size: 0.85rem;">Obteniendo cables internacionales...</i></p>
                <div id="lista-noticias"></div>
            </div>
            <button class="btn-update" onclick="actualizarNoticias()"><i class="fas fa-broadcast-tower"></i> Actualizar Noticias</button>
        </div>
    </div>

    <script>
        const bgImages = [
            "https://website-images.mclaren.com/1924/mclaren-world-of-mclaren-wallpapers-elva-gallery-1.jpg",
            "https://images.ctfassets.net/gy95mqeyjg28/5eFFdEkNfSJRI8fjAmk1IX/6463449c24e60400e609c14b95bdb37d/launch_2026_oscar_desktop.jpg?w=1600&q=75&fm=webp"
        ];
        function rotarFondo() {
            const index = Math.floor(Math.random() * bgImages.length);
            const style = document.createElement('style');
            style.textContent = `body::before { background-image: url('${bgImages[index]}'); }`;
            const existing = document.getElementById('bg-rotator');
            if (existing) existing.remove();
            style.id = 'bg-rotator';
            document.head.appendChild(style);
        }
        window.addEventListener('load', () => { rotarFondo(); setInterval(rotarFondo, 120000); });

        async function actualizarNoticias() {
            const lista = document.getElementById('lista-noticias');
            const status = document.getElementById('status-noticias');
            status.innerText = "Sintonizando cables...";
            try {
                const res = await fetch('/api/noticias');
                const datos = await res.json();
                if (datos.length === 0) { lista.innerHTML = "<p style='color: rgba(255,255,255,0.5);'>No se encontraron noticias.</p>"; } 
                else {
                    lista.innerHTML = `<ul style="padding-left: 0; list-style: none; margin: 0;">` + datos.map(n => `
                        <li class="news-item">
                            <span class="news-meta">${n.fecha} ${n.hora} • <i class="fas fa-rss"></i> ${n.fuente}</span>
                            <a href="${n.link}" target="_blank" class="news-link">${n.titulo}</a>
                        </li>
                    `).join('') + `</ul>`;
                }
                status.innerText = "Última actualización: " + new Date().toLocaleTimeString();
            } catch (e) {
                status.innerText = "Error en la conexión.";
                lista.innerHTML = "<p style='color: #ff4444;'>No se pudieron cargar las noticias.</p>";
            }
        }
        document.addEventListener('DOMContentLoaded', actualizarNoticias);
    </script>
</body>
</html>
