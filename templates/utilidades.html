<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Utilidades - Mi Portal</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <!-- Font Awesome cargado solo en desktop (ahorra ~100KB en móviles) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" media="(min-width: 1025px)">
    <style>
        /* RESET GLOBAL: Evita el desborde y el zoom innecesario */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            overflow-x: hidden; /* Prohibido el scrolleo horizontal */
            -webkit-text-size-adjust: 100%; /* Evita que el navegador agrande la letra solo */
        }
        
        :root { --accent: #5BA3A8; --font: 'Segoe UI', sans-serif; }
        body { margin: 0; color: white; font-family: var(--font); background: #06080d; min-height: 100vh; overflow-x: hidden; }
        body::before { content: ''; position: fixed; inset: 0; z-index: -1; background-size: cover; background-position: center; background-attachment: fixed; filter: brightness(0.52) contrast(1.15) saturate(0.95); opacity: 1; transition: opacity 2s ease-in-out; pointer-events: none; background: linear-gradient(135deg, #0a0a0a 0%, #1a1515 50%, #0a0605 100%) fixed; }
        @media (max-width: 1024px) { body::before { background: linear-gradient(135deg, #0a0a0a 0%, #1a1515 50%, #0a0605 100%) !important; background-attachment: scroll !important; filter: none !important; } }
        .top-nav { padding: clamp(15px, 4vw, 30px); display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto; }
        .btn-back { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: white; text-decoration: none; padding: 12px 25px; border-radius: 30px; backdrop-filter: blur(10px); }
        .page-title { font-size: clamp(1.8rem, 5vw, 2.5rem); font-weight: 800; background: linear-gradient(180deg, white 0%, rgba(255,255,255,0.4) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .dashboard { max-width: 800px; margin: 0 auto; padding: 20px; }
        .glass-card { background: rgba(18, 18, 22, 0.35); border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.12); backdrop-filter: blur(25px); padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .item-bubble { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--accent); }
        .btn-update { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 999px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: bold; }
        .btn-store { display: inline-block; background: rgba(91, 163, 168, 0.2); color: var(--accent); border: 1px solid var(--accent); padding: 8px 18px; border-radius: 20px; text-decoration: none; font-size: 0.85rem; margin-top: 10px; }
        
        @media (max-width: 1024px) {
            .btn-back { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; background: rgba(255, 255, 255, 0.08); }
            .glass-card { backdrop-filter: none !important; -webkit-backdrop-filter: none !important; background: rgba(18, 18, 22, 0.75); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
        }

        /* AJUSTE RESPONSIVO PARA SUBPÁGINAS (Móviles) */
        @media (max-width: 600px) {
            /* Navegación superior alineada a la izquierda */
            .top-nav {
                flex-direction: row !important;
                justify-content: space-between !important;
                align-items: center !important;
                padding: 40px 10px 20px 10px !important;
                text-align: left !important;
            }

            .page-title {
                font-size: 1.8rem !important; /* Título más acorde al móvil */
            }

            /* Forzamos que el contenedor sea una sola columna centrada */
            .dashboard {
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                gap: 20px !important;
                padding: 0 15px 100px 15px !important;
            }

            /* Ajustamos las tarjetas para que no se desborden y se centren */
            .glass-card {
                width: 100% !important;
                max-width: 360px !important; /* Un poco más ancho que los botones de home para poder leer bien */
                padding: 20px !important;
                max-height: none !important; /* Permitimos que la tarjeta crezca hacia abajo para scrollear mejor */
            }

            /* Ajuste específico para el reproductor de TV y videos */
            .ratio-16x9 {
                border-radius: 12px !important;
            }
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Volver al Inicio</a>
        <h1 class="page-title">Errepar</h1>

        function rotar() {
            const imgUrl = bgImages[Math.floor(Math.random() * bgImages.length)];
            const style = document.createElement('style');
            style.textContent = `body::before { background-image: url('${imgUrl}'); }`;
            const existing = document.getElementById('bg-rotator');
            if (existing) existing.remove();
            style.id = 'bg-rotator';
            document.head.appendChild(style);
        }
        async function actualizarErrepar() {
            const res = await fetch('/api/errepar/separatas');
            const datos = await res.json();
            let html = "";
            for (const [k, v] of Object.entries(datos)) {
                html += `<div class="item-bubble"><h3>${v.nombre}</h3><p>Versión: <strong>${v.version_actual}</strong></p><a href="${v.link_compra}" target="_blank" class="btn-store">Ver en Tienda</a></div>`;
            }
            document.getElementById('lista-errepar').innerHTML = html;
        }
        window.onload = () => { rotar(); actualizarErrepar(); };
    </script>
</body>
</html>
